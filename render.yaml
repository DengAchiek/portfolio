services:
  - type: web
    name: portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn portfolio_project.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "127.0.0.1,localhost,achiek.info,www.achiek.info"
      - key: CUSTOM_DOMAINS
        value: "achiek.info,www.achiek.info"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://achiek.info,https://www.achiek.info"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    plan: free
